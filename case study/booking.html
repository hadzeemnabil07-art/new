<!DOCTYPE html>
<html lang="en">
<head>	
  <title>Bootstrap Navbar</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body style="background-color:#1f1f1f;">	

<!-- Navbar -->
<nav class="navbar navbar-expand-sm navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Sport Center</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Facilities</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="cart-list-container">

    <!-- Cart Item 1 -->
    <article class="cic-card" data-id="p1">
        <div class="cic-image-wrapper">
            <img src="https://placehold.co/224x224/8b5cf6/ffffff/png?text=Blanket" alt="A soft, woven linen throw blanket." class="cic-image">
        </div>
        <div class="cic-details">
            <h3 class="cic-title">Linen Throw Blanket</h3>
            <p class="cic-attributes">Color: Indigo / Size: One Size</p>
            <div class="cic-quantity-control">
                <button class="cic-quantity-btn minus-btn" type="button" aria-label="Decrease quantity"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"><path d="M3.75 7.25a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5z" /></svg></button>
                <input class="cic-quantity-input" type="number" value="1" min="1" max="10" aria-label="Item quantity">
                <button class="cic-quantity-btn plus-btn" type="button" aria-label="Increase quantity"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"><path d="M8.75 3.75a.75.75 0 00-1.5 0v3.5h-3.5a.75.75 0 000 1.5h3.5v3.5a.75.75 0 001.5 0v-3.5h3.5a.75.75 0 000-1.5h-3.5v-3.5z" /></svg></button>
            </div>
        </div>
        <div class="cic-actions">
            <p class="cic-price">$79.00</p>
            <a href="#" class="cic-remove-btn">Remove</a>
        </div>
    </article>

    <!-- Cart Item 2 -->
    <article class="cic-card" data-id="p2">
        <div class="cic-image-wrapper">
            <img src="https://placehold.co/224x224/f43f5e/ffffff/png?text=Mugs" alt="A set of handcrafted ceramic mugs." class="cic-image">
        </div>
        <div class="cic-details">
            <h3 class="cic-title">Artisan Ceramic Mug Set</h3>
            <p class="cic-attributes">Set of 4</p>
             <div class="cic-quantity-control">
                <button class="cic-quantity-btn minus-btn" type="button" aria-label="Decrease quantity"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"><path d="M3.75 7.25a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5z" /></svg></button>
                <input class="cic-quantity-input" type="number" value="2" min="1" max="10" aria-label="Item quantity">
                <button class="cic-quantity-btn plus-btn" type="button" aria-label="Increase quantity"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"><path d="M8.75 3.75a.75.75 0 00-1.5 0v3.5h-3.5a.75.75 0 000 1.5h3.5v3.5a.75.75 0 001.5 0v-3.5h3.5a.75.75 0 000-1.5h-3.5v-3.5z" /></svg></button>
            </div>
        </div>
        <div class="cic-actions">
            <p class="cic-price">$90.00</p>
            <a href="#" class="cic-remove-btn">Remove</a>
        </div>
    </article>
</div>

<!-- Place the following JavaScript before your closing </body> tag -->
<script>
document.addEventListener('DOMContentLoaded', () => {
    const cartItems = document.querySelectorAll('.cic-card');

    cartItems.forEach(card => {
        const minusBtn = card.querySelector('.minus-btn');
        const plusBtn = card.querySelector('.plus-btn');
        const quantityInput = card.querySelector('.cic-quantity-input');
        const removeBtn = card.querySelector('.cic-remove-btn');
        const min = parseInt(quantityInput.min, 10);
        const max = parseInt(quantityInput.max, 10);

        minusBtn.addEventListener('click', () => {
            let currentValue = parseInt(quantityInput.value, 10);
            if (currentValue > min) {
                quantityInput.value = currentValue - 1;
            }
        });

        plusBtn.addEventListener('click', () => {
            let currentValue = parseInt(quantityInput.value, 10);
            if (currentValue < max) {
                quantityInput.value = currentValue + 1;
            }
        });
        
        removeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            // In a real application, you would make an API call to remove the item from the cart.
            // For this demo, we'll just remove the element from the DOM.
            card.remove();
        });
    });
});
</script>
</body>
</html>
